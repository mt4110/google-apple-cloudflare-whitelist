# Example nginx server snippet for an origin behind Cloudflare.
#
# 1. Generate helper files:
#    python -m google_apple_whitelist fetch --output-dir ./whitelist_output
#    python -m google_apple_whitelist render --input-dir ./whitelist_output --output-dir ./rendered_assets
#
# 2. Copy rendered_assets/nginx/*.conf into a path nginx can include.

upstream app_backend {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # Trust Cloudflare only for the real client IP.
    include /etc/nginx/generated/google-apple-whitelist/nginx/cloudflare_real_ip.conf;

    location / {
        # Only Cloudflare can reach the origin.
        include /etc/nginx/generated/google-apple-whitelist/nginx/cloudflare_origin_allow.conf;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://app_backend;
    }
}
