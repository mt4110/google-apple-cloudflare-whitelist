min_version = "2024.9.5"

[env]
_.python.venv = { path = ".venv", create = true }
PYTHONPATH = "src"

[tools]
python = "3.12"

[tasks.install]
description = "Install the project in editable mode"
run = "python -m pip install -e ."

[tasks.test]
description = "Run the test suite"
run = "python -m unittest discover -s tests -v"

[tasks.fetch]
description = "Fetch the latest allowlist inputs once"
alias = ["run", "once"]
run = "python -m google_apple_whitelist fetch --output-dir ./whitelist_output"

[tasks.render]
description = "Render nginx/ipset/nftables helper files"
run = "python -m google_apple_whitelist render --input-dir ./whitelist_output --output-dir ./rendered_assets"

[tasks.fetch-render]
description = "Fetch first, then render helper files"
run = "python -m google_apple_whitelist fetch --output-dir ./whitelist_output && python -m google_apple_whitelist render --input-dir ./whitelist_output --output-dir ./rendered_assets"

[tasks.daemon]
description = "Run periodic refreshes in Python"
run = "python -m google_apple_whitelist daemon --output-dir ./whitelist_output --interval-seconds 86400"

[tasks.build-zip]
description = "Build a clean release zip from the current working tree"
run = "python ./scripts/build_release_zip.py --source-dir . --output ./dist/google-apple-whitelist-oss-complete.zip"
